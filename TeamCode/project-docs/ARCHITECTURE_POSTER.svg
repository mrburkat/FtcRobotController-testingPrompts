<svg xmlns="http://www.w3.org/2000/svg" width="18in" height="24in" viewBox="0 0 1800 2400" role="img" aria-labelledby="title desc">
  <title id="title">PVI-FTC TeamCode Architecture Poster</title>
  <desc id="desc">A single-page teaching diagram showing how Gamepad input, OpModes, robot composition, subsystems, FSM states, hardware wrappers, and FTC SDK hardware relate to each other.</desc>
  <defs>
    <style>
      .page { fill: #f7f8fb; }
      .title { fill: #14213d; font: 700 60px Arial, Helvetica, sans-serif; }
      .subtitle { fill: #45556f; font: 400 26px Arial, Helvetica, sans-serif; }
      .section-title { fill: #14213d; font: 700 30px Arial, Helvetica, sans-serif; }
      .box-title { fill: #132238; font: 700 25px Arial, Helvetica, sans-serif; }
      .box-subtitle { fill: #4b5871; font: 400 19px Arial, Helvetica, sans-serif; }
      .method { fill: #102033; font: 700 18px Arial, Helvetica, sans-serif; }
      .body { fill: #26364d; font: 400 18px Arial, Helvetica, sans-serif; }
      .small { fill: #3b4a63; font: 400 15px Arial, Helvetica, sans-serif; }
      .tiny { fill: #47556d; font: 400 13px Arial, Helvetica, sans-serif; }
      .label { fill: #17243a; font: 700 16px Arial, Helvetica, sans-serif; }
      .rule { fill: #fff7ed; stroke: #d97706; stroke-width: 3; }
      .rule-text { fill: #7c2d12; font: 700 18px Arial, Helvetica, sans-serif; }
      .panel { fill: #ffffff; stroke: #d8dee9; stroke-width: 2.5; rx: 18; }
      .soft-panel { fill: #eef6ff; stroke: #9bc2f5; stroke-width: 2.5; rx: 18; }
      .green-panel { fill: #effaf4; stroke: #92d3ad; stroke-width: 2.5; rx: 18; }
      .yellow-panel { fill: #fff8e7; stroke: #f2c56d; stroke-width: 2.5; rx: 18; }
      .rose-panel { fill: #fff1f2; stroke: #f5a6b5; stroke-width: 2.5; rx: 18; }
      .purple-panel { fill: #f4f0ff; stroke: #b7a6ef; stroke-width: 2.5; rx: 18; }
      .teal-panel { fill: #ecfbfb; stroke: #8bd7d2; stroke-width: 2.5; rx: 18; }
      .code-chip { fill: #eef2f7; stroke: #c6d0de; stroke-width: 1.5; rx: 12; }
      .interface-chip { fill: #f2f7ff; stroke: #6ea8fe; stroke-width: 2; rx: 12; }
      .owner-chip { fill: #edfdf3; stroke: #45a46a; stroke-width: 2; rx: 12; }
      .arrow { stroke: #61718a; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .arrow-strong { stroke: #2563eb; stroke-width: 5; fill: none; marker-end: url(#blue-arrowhead); }
      .arrow-green { stroke: #16824a; stroke-width: 5; fill: none; marker-end: url(#green-arrowhead); }
      .arrow-dashed { stroke: #8b5cf6; stroke-width: 4; stroke-dasharray: 12 9; fill: none; marker-end: url(#purple-arrowhead); }
      .boundary { stroke: #a8b3c4; stroke-width: 3; stroke-dasharray: 12 8; fill: none; rx: 22; }
      .divider { stroke: #d4dae5; stroke-width: 2; }
    </style>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#61718a"/>
    </marker>
    <marker id="blue-arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="green-arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16824a"/>
    </marker>
    <marker id="purple-arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <rect class="page" x="0" y="0" width="1800" height="2400"/>

  <text class="title" x="900" y="90" text-anchor="middle">PVI-FTC TeamCode Architecture</text>
  <text class="subtitle" x="900" y="132" text-anchor="middle">A beginner-friendly map of who talks to whom, who owns what, and where methods belong</text>

  <rect class="rule" x="118" y="165" width="1564" height="76" rx="18"/>
  <text class="rule-text" x="150" y="198">Golden rule: code talks downward through public methods.</text>
  <text class="body" x="150" y="224">OpModes read controls and request behavior. Robots own subsystems. Subsystems own FSMs. States command hardware wrappers.</text>

  <!-- Top input lanes -->
  <text class="section-title" x="290" y="300" text-anchor="middle">TeleOp control path</text>
  <text class="section-title" x="1220" y="300" text-anchor="middle">Autonomous control path</text>

  <rect class="soft-panel" x="95" y="335" width="390" height="160" rx="18"/>
  <text class="box-title" x="290" y="375" text-anchor="middle">Gamepad</text>
  <text class="box-subtitle" x="290" y="405" text-anchor="middle">FTC driver controller</text>
  <rect class="code-chip" x="145" y="427" width="290" height="38" rx="12"/>
  <text class="method" x="290" y="452" text-anchor="middle">buttons + sticks + triggers</text>

  <rect class="soft-panel" x="565" y="335" width="390" height="160" rx="18"/>
  <text class="box-title" x="760" y="375" text-anchor="middle">InputManager</text>
  <text class="box-subtitle" x="760" y="405" text-anchor="middle">simple input helper</text>
  <rect class="code-chip" x="608" y="427" width="304" height="38" rx="12"/>
  <text class="method" x="760" y="452" text-anchor="middle">update(gamepad)</text>
  <text class="small" x="760" y="478" text-anchor="middle">held, just pressed, just released</text>

  <path class="arrow-strong" d="M 485 415 L 555 415"/>
  <text class="label" x="520" y="398" text-anchor="middle">read</text>

  <rect class="green-panel" x="1025" y="335" width="390" height="160" rx="18"/>
  <text class="box-title" x="1220" y="375" text-anchor="middle">AutoSequence</text>
  <text class="box-subtitle" x="1220" y="405" text-anchor="middle">non-blocking autonomous steps</text>
  <rect class="code-chip" x="1088" y="427" width="264" height="38" rx="12"/>
  <text class="method" x="1220" y="452" text-anchor="middle">start(), update(), stop()</text>
  <text class="small" x="1220" y="478" text-anchor="middle">runs one AutoStep at a time</text>

  <rect class="green-panel" x="1448" y="335" width="257" height="160" rx="18"/>
  <text class="box-title" x="1576" y="375" text-anchor="middle">AutoStep</text>
  <text class="box-subtitle" x="1576" y="405" text-anchor="middle">reusable timed action</text>
  <text class="small" x="1576" y="438" text-anchor="middle">TimedDriveStep</text>
  <text class="small" x="1576" y="464" text-anchor="middle">TimedIntakeStep</text>
  <path class="arrow-green" d="M 1415 415 L 1438 415"/>

  <!-- OpModes -->
  <rect class="panel" x="95" y="575" width="760" height="230" rx="20"/>
  <text class="box-title" x="475" y="615" text-anchor="middle">TeleOp OpMode</text>
  <text class="box-subtitle" x="475" y="645" text-anchor="middle">FTC entry point for driver control</text>
  <rect class="code-chip" x="135" y="675" width="198" height="36" rx="12"/>
  <text class="method" x="234" y="699" text-anchor="middle">init()</text>
  <rect class="code-chip" x="349" y="675" width="198" height="36" rx="12"/>
  <text class="method" x="448" y="699" text-anchor="middle">start()</text>
  <rect class="code-chip" x="563" y="675" width="198" height="36" rx="12"/>
  <text class="method" x="662" y="699" text-anchor="middle">loop()</text>
  <text class="body" x="135" y="744">Examples: TeamATeleOp, TeamBTeleOp, TeamCTeleOp</text>
  <text class="body" x="135" y="774">Maps InputManager values to Robot public methods.</text>

  <rect class="panel" x="945" y="575" width="760" height="230" rx="20"/>
  <text class="box-title" x="1325" y="615" text-anchor="middle">Autonomous OpMode</text>
  <text class="box-subtitle" x="1325" y="645" text-anchor="middle">FTC entry point for autonomous</text>
  <rect class="code-chip" x="985" y="675" width="198" height="36" rx="12"/>
  <text class="method" x="1084" y="699" text-anchor="middle">init()</text>
  <rect class="code-chip" x="1199" y="675" width="198" height="36" rx="12"/>
  <text class="method" x="1298" y="699" text-anchor="middle">start()</text>
  <rect class="code-chip" x="1413" y="675" width="198" height="36" rx="12"/>
  <text class="method" x="1512" y="699" text-anchor="middle">loop()</text>
  <text class="body" x="985" y="744">Example: TeamAAutoOpMode</text>
  <text class="body" x="985" y="774">Updates AutoSequence, then calls robot.update().</text>

  <path class="arrow-strong" d="M 760 495 L 760 535 C 760 560 735 575 700 575"/>
  <path class="arrow-green" d="M 1220 495 L 1220 535 C 1220 560 1245 575 1280 575"/>

  <!-- Robot composition -->
  <rect class="purple-panel" x="230" y="900" width="1340" height="290" rx="24"/>
  <text class="section-title" x="900" y="945" text-anchor="middle">Team Robot: the composition boundary</text>
  <text class="box-subtitle" x="900" y="980" text-anchor="middle">TeamARobot, TeamBRobot, TeamCRobot subclass Robot</text>
  <rect class="owner-chip" x="290" y="1015" width="250" height="42" rx="12"/>
  <text class="method" x="415" y="1042" text-anchor="middle">owns RobotHardware</text>
  <rect class="owner-chip" x="585" y="1015" width="270" height="42" rx="12"/>
  <text class="method" x="720" y="1042" text-anchor="middle">registers Subsystems</text>
  <rect class="interface-chip" x="900" y="1015" width="285" height="42" rx="12"/>
  <text class="method" x="1042" y="1042" text-anchor="middle">implements Auto interfaces</text>
  <rect class="code-chip" x="1230" y="1015" width="250" height="42" rx="12"/>
  <text class="method" x="1355" y="1042" text-anchor="middle">safe stop path</text>
  <text class="body" x="300" y="1100">Robot methods students call:</text>
  <text class="method" x="300" y="1130">initialize(hardwareMap), update(), stop(), drive(...), startIntake(), enableVision()</text>
  <text class="small" x="300" y="1160">The OpMode should not reach past this robot boundary to motors, FSMs, or states.</text>

  <path class="arrow" d="M 475 805 L 475 850 C 475 880 570 900 660 900"/>
  <path class="arrow" d="M 1325 805 L 1325 850 C 1325 880 1230 900 1140 900"/>

  <!-- Subsystems -->
  <rect class="boundary" x="105" y="1280" width="1590" height="390" rx="24"/>
  <text class="section-title" x="900" y="1324" text-anchor="middle">Subsystem layer: reusable mechanism brains</text>
  <text class="box-subtitle" x="900" y="1356" text-anchor="middle">Each subsystem implements Subsystem and owns one FSM</text>

  <rect class="yellow-panel" x="155" y="1400" width="455" height="210" rx="18"/>
  <text class="box-title" x="382" y="1438" text-anchor="middle">DriveSubsystem</text>
  <text class="box-subtitle" x="382" y="1468" text-anchor="middle">mecanum drive requests</text>
  <text class="method" x="195" y="1510">drive(fwd, strafe, rotate)</text>
  <text class="method" x="195" y="1540">enableManualDrive()</text>
  <text class="method" x="195" y="1570">enableHeadingHold()</text>

  <rect class="yellow-panel" x="672" y="1400" width="455" height="210" rx="18"/>
  <text class="box-title" x="900" y="1438" text-anchor="middle">IntakeSubsystem</text>
  <text class="box-subtitle" x="900" y="1468" text-anchor="middle">optional mechanism requests</text>
  <text class="method" x="712" y="1510">startIntake()</text>
  <text class="method" x="712" y="1540">hold(), eject()</text>
  <text class="method" x="712" y="1570">isAvailable()</text>

  <rect class="yellow-panel" x="1189" y="1400" width="455" height="210" rx="18"/>
  <text class="box-title" x="1416" y="1438" text-anchor="middle">VisionSubsystem</text>
  <text class="box-subtitle" x="1416" y="1468" text-anchor="middle">optional vision lifecycle</text>
  <text class="method" x="1229" y="1510">enableVision()</text>
  <text class="method" x="1229" y="1540">disableVision()</text>
  <text class="method" x="1229" y="1570">reportTargetDetected(...)</text>

  <path class="arrow" d="M 900 1190 L 900 1250"/>
  <path class="arrow" d="M 900 1250 C 900 1372 382 1340 382 1390"/>
  <path class="arrow" d="M 900 1250 L 900 1390"/>
  <path class="arrow" d="M 900 1250 C 900 1372 1416 1340 1416 1390"/>

  <!-- FSM and states -->
  <rect class="teal-panel" x="155" y="1760" width="1490" height="300" rx="24"/>
  <text class="section-title" x="900" y="1805" text-anchor="middle">FSM layer: one active state at a time</text>
  <text class="box-subtitle" x="900" y="1838" text-anchor="middle">FSM evaluates transitions in order, then calls the active State update()</text>

  <rect class="interface-chip" x="220" y="1880" width="300" height="56" rx="14"/>
  <text class="box-title" x="370" y="1915" text-anchor="middle">State interface</text>
  <text class="small" x="370" y="1958" text-anchor="middle">enter(), update(), exit(), getName()</text>

  <rect class="code-chip" x="570" y="1880" width="295" height="56" rx="14"/>
  <text class="box-title" x="718" y="1915" text-anchor="middle">Drive states</text>
  <text class="small" x="718" y="1958" text-anchor="middle">Disabled, Manual, HeadingHold</text>

  <rect class="code-chip" x="915" y="1880" width="295" height="56" rx="14"/>
  <text class="box-title" x="1062" y="1915" text-anchor="middle">Intake states</text>
  <text class="small" x="1062" y="1958" text-anchor="middle">Idle, Intaking, Holding, Ejecting</text>

  <rect class="code-chip" x="1260" y="1880" width="310" height="56" rx="14"/>
  <text class="box-title" x="1415" y="1915" text-anchor="middle">Vision states</text>
  <text class="small" x="1415" y="1958" text-anchor="middle">Disabled, Searching, Tracking</text>

  <text class="body" x="235" y="2010">Students can ask for behavior; they do not choose concrete states directly.</text>
  <text class="body" x="235" y="2040">States are small: while active, they command the correct hardware wrapper method.</text>

  <path class="arrow" d="M 382 1610 C 382 1690 570 1700 718 1760"/>
  <path class="arrow" d="M 900 1610 L 900 1760"/>
  <path class="arrow" d="M 1416 1610 C 1416 1690 1240 1700 1062 1760"/>

  <!-- Hardware -->
  <rect class="rose-panel" x="155" y="2150" width="1490" height="170" rx="24"/>
  <text class="section-title" x="900" y="2195" text-anchor="middle">Hardware wrappers: the only TeamCode classes that touch FTC devices</text>
  <text class="body" x="220" y="2240">DriveHardware wraps required motors: frontLeft, frontRight, rearLeft, rearRight.</text>
  <text class="body" x="220" y="2272">IntakeHardware and VisionHardware are optional during early testing and fail safely when unavailable.</text>
  <text class="body" x="220" y="2304">FTC SDK hardware stays behind wrappers: DcMotorEx, HardwareMap, sensors, cameras, and future devices.</text>

  <path class="arrow" d="M 900 2060 L 900 2140"/>

  <!-- Side reminders -->
  <rect class="panel" x="95" y="835" width="125" height="365" rx="18"/>
  <text class="label" x="157" y="875" text-anchor="middle">DO</text>
  <text class="tiny" x="157" y="915" text-anchor="middle">call</text>
  <text class="tiny" x="157" y="938" text-anchor="middle">Robot</text>
  <text class="tiny" x="157" y="961" text-anchor="middle">methods</text>
  <line class="divider" x1="120" y1="990" x2="195" y2="990"/>
  <text class="tiny" x="157" y="1025" text-anchor="middle">update</text>
  <text class="tiny" x="157" y="1048" text-anchor="middle">once per</text>
  <text class="tiny" x="157" y="1071" text-anchor="middle">loop</text>
  <line class="divider" x1="120" y1="1100" x2="195" y2="1100"/>
  <text class="tiny" x="157" y="1135" text-anchor="middle">keep</text>
  <text class="tiny" x="157" y="1158" text-anchor="middle">layers</text>
  <text class="tiny" x="157" y="1181" text-anchor="middle">simple</text>

  <rect class="panel" x="1580" y="835" width="125" height="365" rx="18"/>
  <text class="label" x="1642" y="875" text-anchor="middle">AVOID</text>
  <text class="tiny" x="1642" y="915" text-anchor="middle">motors in</text>
  <text class="tiny" x="1642" y="938" text-anchor="middle">OpModes</text>
  <line class="divider" x1="1605" y1="990" x2="1680" y2="990"/>
  <text class="tiny" x="1642" y="1025" text-anchor="middle">gamepads</text>
  <text class="tiny" x="1642" y="1048" text-anchor="middle">inside</text>
  <text class="tiny" x="1642" y="1071" text-anchor="middle">states</text>
  <line class="divider" x1="1605" y1="1100" x2="1680" y2="1100"/>
  <text class="tiny" x="1642" y="1135" text-anchor="middle">sleep()</text>
  <text class="tiny" x="1642" y="1158" text-anchor="middle">or</text>
  <text class="tiny" x="1642" y="1181" text-anchor="middle">blocking</text>

  <text class="small" x="900" y="2365" text-anchor="middle">Reading direction: top to bottom. Ownership direction: each layer owns or calls the layer below it.</text>
</svg>
